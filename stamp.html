<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電子印鑑 | 3種委員会</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --blue:#003087;--blue-d:#001f5c;--blue-l:#0050c8;
  --red:#c8001e;--gold:#c8a000;--green:#006830;
  --bg:#f0f2f7;--card:#fff;--text:#1a1a2e;--sub:#5a5a7a;--border:#d0d4e0;
  --r:8px;--sh:0 2px 14px rgba(0,48,135,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--bg);color:var(--text);font-size:14px}

.nav{background:var(--blue);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;box-shadow:0 2px 8px rgba(0,0,0,.3);position:sticky;top:0;z-index:100}
.nav-brand{color:#fff;font-size:13px;font-weight:700;line-height:1.3}
.nav-brand span{display:block;font-size:10px;opacity:.7;font-weight:400}
.nav-links{display:flex;gap:8px}
.nav-link{color:rgba(255,255,255,.7);font-size:12px;text-decoration:none;padding:5px 10px;border:1px solid rgba(255,255,255,.3);border-radius:4px}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.1)}

.main{max-width:1100px;margin:0 auto;padding:20px 14px 80px}

/* STEPS */
.steps{display:flex;align-items:center;margin-bottom:24px;overflow-x:auto;scrollbar-width:none;gap:0}
.steps::-webkit-scrollbar{display:none}
.step{flex:none;display:flex;align-items:center}
.step-inner{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--card);border-radius:24px;box-shadow:var(--sh);font-size:12px;font-weight:600;color:var(--sub);white-space:nowrap}
.step-inner.active{background:var(--blue);color:#fff}
.step-inner.done{background:var(--green);color:#fff}
.step-num{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.step-arrow{padding:0 6px;color:var(--border);font-size:18px}

.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px;overflow:hidden}
.card-head{background:var(--blue);color:#fff;padding:12px 18px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-pad{padding:20px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-l)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.85}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.85}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{opacity:.85}
.btn-ghost{background:#f0f2f7;color:var(--text);border:1.5px solid var(--border)}.btn-ghost:hover{background:var(--border)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-full{width:100%;justify-content:center}

/* UPLOAD ZONE */
.upload-zone{border:2.5px dashed var(--blue);border-radius:10px;padding:48px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#f8f9ff}
.upload-zone:hover,.upload-zone.drag{background:#e8f0ff;border-color:var(--blue-l)}
.upload-zone .uz-icon{font-size:48px;margin-bottom:12px}
.upload-zone h3{font-size:15px;font-weight:700;color:var(--blue);margin-bottom:6px}
.upload-zone p{font-size:12px;color:var(--sub)}
.upload-zone input{display:none}

/* CANVAS AREA */
.canvas-wrap{position:relative;display:inline-block;cursor:crosshair;border:2px solid var(--border);border-radius:4px;overflow:hidden}
.canvas-wrap canvas{display:block}
.stamp-preview{position:absolute;pointer-events:none;transform:translate(-50%,-50%)}
.stamp-cursor{position:absolute;pointer-events:none;transform:translate(-50%,-50%);opacity:.6}

/* STAMP PALETTE */
.stamp-palette{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stamp-opt{border:2.5px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;text-align:center;min-width:80px}
.stamp-opt.active{border-color:var(--red)}
.stamp-opt canvas{display:block;margin:0 auto}
.stamp-opt span{font-size:10px;color:var(--sub);display:block;margin-top:3px}

/* PLACED STAMPS */
.placed-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
.placed-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f8f9ff;border-radius:6px;border:1px solid var(--border)}
.placed-item span{flex:1;font-size:12px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;max-width:90vw}
.toast.show{opacity:1}

/* STATUS BADGE */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-blue{background:#e8f0ff;color:var(--blue)}
.badge-red{background:#ffe8ea;color:var(--red)}
.badge-green{background:#e6f7ed;color:var(--green)}

.info-row{display:flex;gap:8px;flex-wrap:wrap;padding:10px 0;border-bottom:1px solid #eef0f5;font-size:12px}
.info-row dt{color:var(--sub);min-width:80px}
.info-row dd{font-weight:600}

.section-hidden{display:none}
.section-visible{display:block}

@media(max-width:640px){
  .stamp-palette{gap:6px}
  .stamp-opt{min-width:64px;padding:5px 8px}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<nav class="nav">
  <div class="nav-brand">3種委員会 電子印鑑システム<br><span>山梨県サッカー協会</span></div>
  <div class="nav-links">
    <a href="admin.html" class="nav-link">管理画面</a>
    <a href="schedule.html" class="nav-link">日程作成</a>
  </div>
</nav>

<div class="main">

  <!-- STEPS -->
  <div class="steps" id="stepsBar"></div>

  <!-- STEP1: UPLOAD -->
  <div id="step1" class="section-visible">
    <div class="card">
      <div class="card-head">📤 STEP 1｜メンバー表アップロード</div>
      <div class="card-pad">
        <p style="font-size:12px;color:var(--sub);margin-bottom:16px;">
          チームから提出されたメンバー表（PDF または Excel）をアップロードしてください。
        </p>
        <div class="upload-zone" id="uploadZone"
          ondragover="onDrag(event,true)" ondragleave="onDrag(event,false)" ondrop="onDrop(event)"
          onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept=".pdf,.xlsx,.xls" onchange="handleFile(this.files[0])">
          <div class="uz-icon">📄</div>
          <h3>ここにファイルをドロップ</h3>
          <p>クリックしてファイルを選択<br>対応形式: PDF / Excel (.xlsx, .xls)</p>
        </div>
        <div id="uploadInfo" style="display:none;margin-top:16px;" class="card" style="margin:0">
          <div class="card-pad" style="padding:12px 16px">
            <div id="fileInfoContent"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP2: CONFIRM -->
  <div id="step2" class="section-hidden">
    <div class="card">
      <div class="card-head">🔍 STEP 2｜内容確認</div>
      <div class="card-pad">
        <div id="previewArea" style="text-align:center;overflow:auto"></div>
        <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;justify-content:center">
          <button class="btn btn-ghost" onclick="goStep(1)">← 戻る</button>
          <button class="btn btn-primary" onclick="goStep(3)">印鑑押印へ →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP3: STAMP -->
  <div id="step3" class="section-hidden">
    <div style="display:grid;grid-template-columns:1fr 300px;gap:16px">
      <!-- LEFT: canvas -->
      <div>
        <div class="card">
          <div class="card-head">🔖 STEP 3｜電子印鑑押印</div>
          <div class="card-pad" style="overflow:auto">
            <p style="font-size:12px;color:var(--sub);margin-bottom:14px;">書類上をクリックして印鑑を押してください。</p>
            <div style="overflow:auto">
              <div class="canvas-wrap" id="canvasWrap">
                <canvas id="docCanvas"></canvas>
                <canvas id="stampLayer" style="position:absolute;top:0;left:0;pointer-events:none"></canvas>
              </div>
            </div>
            <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
              <button class="btn btn-ghost" onclick="goStep(2)">← 戻る</button>
              <button class="btn btn-success" onclick="goStep(4)">押印完了 →</button>
            </div>
          </div>
        </div>
      </div>
      <!-- RIGHT: controls -->
      <div>
        <div class="card">
          <div class="card-head">🔴 印鑑設定</div>
          <div class="card-pad">
            <div class="form-g" style="margin-bottom:12px">
              <label style="font-size:12px;font-weight:600;color:var(--sub);display:block;margin-bottom:6px">印鑑の種類</label>
              <div class="stamp-palette" id="stampPalette"></div>
            </div>
            <div class="form-g" style="margin-bottom:12px">
              <label style="font-size:12px;font-weight:600;color:var(--sub);display:block;margin-bottom:6px">サイズ</label>
              <input type="range" id="stampSize" min="30" max="100" value="52" oninput="updateStampSize()" style="width:100%">
              <div style="font-size:11px;color:var(--sub);text-align:center" id="stampSizeLabel">52px</div>
            </div>
            <div class="form-g" style="margin-bottom:12px">
              <label style="font-size:12px;font-weight:600;color:var(--sub);display:block;margin-bottom:6px">カスタム文字</label>
              <input type="text" id="customText" placeholder="例：田畑" style="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:6px;font-size:14px" oninput="updateCustomStamp()">
            </div>
            <div class="form-g">
              <label style="font-size:12px;font-weight:600;color:var(--sub);display:block;margin-bottom:6px">押印済み一覧</label>
              <div class="placed-list" id="placedList">
                <div style="font-size:12px;color:var(--sub);text-align:center;padding:12px">まだ押印されていません</div>
              </div>
              <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px" onclick="undoStamp()">↩ 最後の押印を取り消す</button>
            </div>
          </div>
        </div>
        <!-- ページ送り（PDF複数ページ対応） -->
        <div class="card" id="paginationCard" style="display:none">
          <div class="card-pad" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px">
            <button class="btn btn-ghost btn-sm" onclick="changePage(-1)">◀ 前</button>
            <span id="pageLabel" style="font-size:12px;font-weight:600">1 / 1</span>
            <button class="btn btn-ghost btn-sm" onclick="changePage(1)">次 ▶</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP4: DOWNLOAD -->
  <div id="step4" class="section-hidden">
    <div class="card">
      <div class="card-head">✅ STEP 4｜押印済みファイル保存</div>
      <div class="card-pad">
        <div style="text-align:center;padding:24px 0">
          <div style="font-size:48px;margin-bottom:12px">✅</div>
          <div style="font-size:18px;font-weight:700;color:var(--green);margin-bottom:8px">押印が完了しました</div>
          <div id="stampSummary" style="font-size:13px;color:var(--sub);margin-bottom:24px"></div>
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="downloadPDF()">📄 PDFでダウンロード</button>
            <button class="btn btn-ghost" onclick="downloadPNG()">🖼 PNG画像でダウンロード</button>
          </div>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:16px;margin-top:8px">
          <div style="font-size:12px;font-weight:700;color:var(--sub);margin-bottom:10px">押印内容</div>
          <div id="finalPreview" style="text-align:center"></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
          <button class="btn btn-ghost" onclick="goStep(3)">← 印鑑を修正する</button>
          <button class="btn btn-ghost" onclick="resetAll()">🔄 新しいファイルを処理</button>
        </div>
      </div>
    </div>
  </div>

</div><!-- /main -->

<script>
// ─── PDF.js setup ───
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─── State ───
let state={
  step:1, fileName:'', fileType:'', // 'pdf' | 'xlsx'
  pdfDoc:null, currentPage:1, totalPages:1,
  scale:1.5,
  stampType:'circle', stampSize:52, customText:'山梨3種',
  placedStamps:[], // {page,x,y,type,size,text}
  xlsxData:null
};

// ─── STEP BAR ───
function renderSteps(){
  const labels=['ファイル\nアップロード','内容\n確認','電子印鑑\n押印','ファイル\n保存'];
  document.getElementById('stepsBar').innerHTML=labels.map((l,i)=>{
    const n=i+1;
    const cls=n<state.step?'done':n===state.step?'active':'';
    return `${i>0?'<div class="step-arrow">›</div>':''}
    <div class="step">
      <div class="step-inner ${cls}">
        <div class="step-num">${n<state.step?'✓':n}</div>
        ${l.replace('\n','<br>')}
      </div>
    </div>`;
  }).join('');
}

function goStep(n){
  state.step=n;
  for(let i=1;i<=4;i++){
    document.getElementById('step'+i).className=i===n?'section-visible':'section-hidden';
  }
  renderSteps();
  if(n===2) renderPreview();
  if(n===3) initStampCanvas();
  if(n===4) renderFinalStep();
}

// ─── FILE UPLOAD ───
function onDrag(e,over){e.preventDefault();document.getElementById('uploadZone').classList[over?'add':'remove']('drag');}
function onDrop(e){e.preventDefault();document.getElementById('uploadZone').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)handleFile(f);}

async function handleFile(file){
  if(!file) return;
  state.fileName=file.name;
  state.placedStamps=[];
  const ext=file.name.split('.').pop().toLowerCase();

  if(ext==='pdf'){
    state.fileType='pdf';
    const buf=await file.arrayBuffer();
    state.pdfDoc=await pdfjsLib.getDocument({data:buf}).promise;
    state.totalPages=state.pdfDoc.numPages;
    state.currentPage=1;
    document.getElementById('fileInfoContent').innerHTML=`
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:32px">📄</span>
        <div>
          <div style="font-weight:700">${file.name}</div>
          <div style="font-size:12px;color:var(--sub)">PDF ／ ${state.totalPages}ページ ／ ${(file.size/1024).toFixed(1)} KB</div>
        </div>
        <span class="badge badge-blue" style="margin-left:auto">PDF</span>
      </div>`;
    document.getElementById('uploadInfo').style.display='block';
    goStep(2);
  } else if(ext==='xlsx'||ext==='xls'){
    state.fileType='xlsx';
    const buf=await file.arrayBuffer();
    state.xlsxData=buf;
    document.getElementById('fileInfoContent').innerHTML=`
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:32px">📊</span>
        <div>
          <div style="font-weight:700">${file.name}</div>
          <div style="font-size:12px;color:var(--sub)">Excel ／ ${(file.size/1024).toFixed(1)} KB</div>
        </div>
        <span class="badge badge-green" style="margin-left:auto">Excel→PDF変換</span>
      </div>`;
    document.getElementById('uploadInfo').style.display='block';
    goStep(2);
  } else {
    alert('PDFまたはExcel（.xlsx/.xls）ファイルを選択してください');
  }
}

// ─── PREVIEW ───
async function renderPreview(){
  const area=document.getElementById('previewArea');
  if(state.fileType==='pdf'){
    const page=await state.pdfDoc.getPage(1);
    const vp=page.getViewport({scale:1.0});
    const maxW=Math.min(700,window.innerWidth-60);
    const sc=maxW/vp.width;
    const vp2=page.getViewport({scale:sc});
    const c=document.createElement('canvas');
    c.width=vp2.width; c.height=vp2.height;
    await page.render({canvasContext:c.getContext('2d'),viewport:vp2}).promise;
    area.innerHTML='';
    area.appendChild(c);
    c.style.border='1px solid var(--border)';
    c.style.borderRadius='4px';
    if(state.totalPages>1){
      area.insertAdjacentHTML('beforeend',`<div style="font-size:12px;color:var(--sub);margin-top:8px">全${state.totalPages}ページ（印鑑は全ページに対応）</div>`);
    }
  } else {
    // xlsx→canvas変換（シンプルなプレビュー）
    const wb=XLSX.read(state.xlsxData,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const html=XLSX.utils.sheet_to_html(ws);
    area.innerHTML=`<div style="overflow:auto;max-height:500px;border:1px solid var(--border);border-radius:4px;padding:8px;text-align:left;font-size:11px">${html}</div>
    <div style="font-size:12px;color:var(--sub);margin-top:8px">シート: ${wb.SheetNames[0]} ／ 全${wb.SheetNames.length}シート<br>※Excelファイルは画像としてキャンバスに変換して押印します</div>`;
  }
}

// ─── STAMP CANVAS ───
let docCtx, stampCtx, docCanvas, stampCanvas;
let isMouseOnCanvas=false;

async function initStampCanvas(){
  docCanvas=document.getElementById('docCanvas');
  stampCanvas=document.getElementById('stampLayer');
  docCtx=docCanvas.getContext('2d');
  stampCtx=stampCanvas.getContext('2d');

  // PDF → canvas
  if(state.fileType==='pdf'){
    const page=await state.pdfDoc.getPage(state.currentPage);
    const vp=page.getViewport({scale:state.scale});
    const maxW=Math.min(780,window.innerWidth-380);
    const sc=maxW/vp.width;
    const vp2=page.getViewport({scale:state.scale*sc});
    docCanvas.width=vp2.width; docCanvas.height=vp2.height;
    stampCanvas.width=vp2.width; stampCanvas.height=vp2.height;
    await page.render({canvasContext:docCtx,viewport:vp2}).promise;
    if(state.totalPages>1) document.getElementById('paginationCard').style.display='block';
    document.getElementById('pageLabel').textContent=`${state.currentPage} / ${state.totalPages}`;
  } else {
    // xlsx → canvas（グリッド描画）
    docCanvas.width=780; docCanvas.height=1100;
    stampCanvas.width=780; stampCanvas.height=1100;
    drawXlsxOnCanvas();
  }

  renderStampPalette();
  redrawStamps();

  // イベント
  const wrap=document.getElementById('canvasWrap');
  wrap.addEventListener('click', onCanvasClick);
  wrap.addEventListener('mousemove', onCanvasHover);
  wrap.addEventListener('mouseleave',()=>{ redrawStamps(); });
}

function drawXlsxOnCanvas(){
  const wb=XLSX.read(state.xlsxData,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  docCtx.fillStyle='#fff'; docCtx.fillRect(0,0,docCanvas.width,docCanvas.height);
  docCtx.strokeStyle='#ccc'; docCtx.lineWidth=0.5;
  const colW=90, rowH=24, startX=10, startY=10;
  data.slice(0,40).forEach((row,ri)=>{
    row.slice(0,8).forEach((cell,ci)=>{
      const x=startX+ci*colW, y=startY+ri*rowH;
      docCtx.strokeRect(x,y,colW,rowH);
      if(cell!==''&&cell!==null&&cell!==undefined){
        docCtx.fillStyle='#1a1a2e'; docCtx.font='11px sans-serif';
        docCtx.fillText(String(cell).slice(0,12),x+3,y+16);
      }
    });
  });
}

function onCanvasClick(e){
  const rect=docCanvas.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;
  state.placedStamps.push({
    page:state.currentPage, x, y,
    type:state.stampType, size:state.stampSize,
    text:state.customText||'山梨3種'
  });
  redrawStamps();
  renderPlacedList();
  toast(`✅ 押印しました（合計${state.placedStamps.length}箇所）`);
}

function onCanvasHover(e){
  const rect=docCanvas.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;
  redrawStamps();
  // カーソル位置にプレビュー
  drawStamp(stampCtx,x,y,state.stampType,state.stampSize,state.customText||'山梨3種',0.5);
}

function redrawStamps(){
  stampCtx.clearRect(0,0,stampCanvas.width,stampCanvas.height);
  state.placedStamps.filter(s=>s.page===state.currentPage).forEach(s=>{
    drawStamp(stampCtx,s.x,s.y,s.type,s.size,s.text,1.0);
  });
}

function drawStamp(ctx,cx,cy,type,size,text,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  const r=size/2;
  if(type==='circle'){
    // 円形印鑑
    ctx.strokeStyle='#c8001e'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,r-5,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#c8001e'; ctx.font=`bold ${Math.floor(r*0.55)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    // 縦書きっぽく（2行）
    const chars=text.slice(0,4);
    if(chars.length<=2){
      ctx.fillText(chars,cx,cy);
    } else {
      ctx.fillText(chars.slice(0,2),cx,cy-r*0.2);
      ctx.fillText(chars.slice(2),cx,cy+r*0.3);
    }
  } else if(type==='rect'){
    // 角型印鑑
    ctx.strokeStyle='#c8001e'; ctx.lineWidth=2;
    ctx.strokeRect(cx-r,cy-r,size,size);
    ctx.strokeRect(cx-r+3,cy-r+3,size-6,size-6);
    ctx.fillStyle='#c8001e'; ctx.font=`bold ${Math.floor(r*0.5)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(text.slice(0,4),cx,cy);
  } else if(type==='official'){
    // 公印（二重円＋テキスト）
    ctx.strokeStyle='#c8001e'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(cx,cy,r*0.7,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#c8001e'; ctx.font=`bold ${Math.floor(r*0.3)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('山梨県',cx,cy-r*0.2);
    ctx.font=`bold ${Math.floor(r*0.22)}px serif`;
    ctx.fillText('サッカー協会',cx,cy+r*0.1);
    ctx.font=`bold ${Math.floor(r*0.18)}px serif`;
    ctx.fillText('第3種委員会',cx,cy+r*0.35);
  } else if(type==='check'){
    // 受領印
    ctx.strokeStyle='#003087'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#003087'; ctx.font=`bold ${Math.floor(r*0.55)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('受',cx,cy-r*0.15);
    ctx.font=`${Math.floor(r*0.3)}px serif`;
    ctx.fillText('委員会印',cx,cy+r*0.4);
  }
  ctx.restore();
}

// ─── STAMP PALETTE ───
function renderStampPalette(){
  const types=[
    {id:'circle',label:'丸印（個人）'},
    {id:'rect',label:'角印（団体）'},
    {id:'official',label:'公印（協会）'},
    {id:'check',label:'受領印'},
  ];
  const pal=document.getElementById('stampPalette');
  pal.innerHTML=types.map(t=>`
    <div class="stamp-opt ${state.stampType===t.id?'active':''}" onclick="selectStampType('${t.id}')">
      <canvas width="60" height="60" id="prevc_${t.id}"></canvas>
      <span>${t.label}</span>
    </div>`).join('');
  types.forEach(t=>{
    const c=document.getElementById('prevc_'+t.id);
    const ctx2=c.getContext('2d');
    drawStamp(ctx2,30,30,t.id,44,state.customText||'山梨3種',1.0);
  });
}

function selectStampType(t){ state.stampType=t; renderStampPalette(); }
function updateStampSize(){
  state.stampSize=parseInt(document.getElementById('stampSize').value);
  document.getElementById('stampSizeLabel').textContent=state.stampSize+'px';
  renderStampPalette();
}
function updateCustomStamp(){
  state.customText=document.getElementById('customText').value;
  renderStampPalette();
}
function undoStamp(){
  const last=state.placedStamps.filter(s=>s.page===state.currentPage);
  if(last.length===0){toast('押印がありません');return;}
  const lastIdx=state.placedStamps.lastIndexOf(last[last.length-1]);
  state.placedStamps.splice(lastIdx,1);
  redrawStamps(); renderPlacedList();
  toast('↩ 取り消しました');
}

function renderPlacedList(){
  const list=document.getElementById('placedList');
  if(state.placedStamps.length===0){
    list.innerHTML='<div style="font-size:12px;color:var(--sub);text-align:center;padding:12px">まだ押印されていません</div>';
    return;
  }
  list.innerHTML=state.placedStamps.map((s,i)=>`
    <div class="placed-item">
      <span>P${s.page} (${Math.round(s.x)}, ${Math.round(s.y)}) ${s.type} "${s.text}"</span>
      <button class="btn btn-ghost btn-sm" style="padding:3px 8px;" onclick="removeStamp(${i})">×</button>
    </div>`).join('');
}

function removeStamp(i){ state.placedStamps.splice(i,1); redrawStamps(); renderPlacedList(); }

// ─── PAGE NAVIGATION ───
async function changePage(d){
  const newP=state.currentPage+d;
  if(newP<1||newP>state.totalPages) return;
  state.currentPage=newP;
  const page=await state.pdfDoc.getPage(newP);
  const vp=page.getViewport({scale:state.scale});
  const maxW=Math.min(780,window.innerWidth-380);
  const sc=maxW/vp.width;
  const vp2=page.getViewport({scale:state.scale*sc});
  docCanvas.width=vp2.width; docCanvas.height=vp2.height;
  stampCanvas.width=vp2.width; stampCanvas.height=vp2.height;
  await page.render({canvasContext:docCtx,viewport:vp2}).promise;
  redrawStamps();
  document.getElementById('pageLabel').textContent=`${newP} / ${state.totalPages}`;
}

// ─── STEP 4: FINALIZE ───
function renderFinalStep(){
  // 合成済みcanvasを表示
  const merged=getMergedCanvas();
  const img=new Image(); img.src=merged.toDataURL();
  img.style.maxWidth='100%'; img.style.border='1px solid var(--border)'; img.style.borderRadius='4px';
  document.getElementById('finalPreview').innerHTML='';
  document.getElementById('finalPreview').appendChild(img);
  document.getElementById('stampSummary').textContent=
    `印鑑 ${state.placedStamps.length}箇所 が押印されています`;
}

function getMergedCanvas(){
  // docCanvas + stampLayer を合成
  const merged=document.createElement('canvas');
  merged.width=docCanvas.width; merged.height=docCanvas.height;
  const mCtx=merged.getContext('2d');
  mCtx.drawImage(docCanvas,0,0);
  // 全ページ分のスタンプを描画
  state.placedStamps.filter(s=>s.page===state.currentPage).forEach(s=>{
    drawStamp(mCtx,s.x,s.y,s.type,s.size,s.text,1.0);
  });
  return merged;
}

// ─── DOWNLOAD ───
function downloadPNG(){
  const merged=getMergedCanvas();
  const a=document.createElement('a');
  a.href=merged.toDataURL('image/png');
  a.download=state.fileName.replace(/\.[^.]+$/,'')+'_押印済み.png';
  a.click();
  toast('📥 PNG保存しました');
}

function downloadPDF(){
  // jsPDFがない場合はCanvasをPDF変換（シンプル版）
  const merged=getMergedCanvas();
  const imgData=merged.toDataURL('image/png');
  // A4サイズ想定のiframe印刷方式
  const w=window.open('');
  w.document.write(`<!DOCTYPE html><html><head><title>押印済メンバー表</title>
  <style>body{margin:0}img{width:100%;height:auto}</style></head>
  <body onload="window.print();window.close()">
  <img src="${imgData}"></body></html>`);
  w.document.close();
  toast('📄 印刷ダイアログが開きます（PDFとして保存できます）');
}

// ─── RESET ───
function resetAll(){
  state={step:1,fileName:'',fileType:'',pdfDoc:null,currentPage:1,totalPages:1,scale:1.5,stampType:'circle',stampSize:52,customText:'山梨3種',placedStamps:[],xlsxData:null};
  document.getElementById('fileInput').value='';
  document.getElementById('uploadInfo').style.display='none';
  goStep(1);
}

// ─── TOAST ───
function toast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

// ─── INIT ───
renderSteps();
</script>

<style>

    --gold: #c8a000;
    --bg: #f5f6f8;

    --text: #1a1a2e;
    --text-sub: #555577;
    --border: #d0d4e0;
    --card: #ffffff;

  /* NAV */
  .nav { background: var(--jfa-blue); position: sticky; top: 0; z-index: 100; height: var(--nav-h); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .nav-brand { color: #fff; font-size: 13px; font-weight: 700; line-height: 1.3; }
  .nav-brand span { display: block; font-size: 10px; font-weight: 400; opacity: 0.75; letter-spacing: 0.05em; }
  .nav-admin { color: rgba(255,255,255,0.6); font-size: 11px; text-decoration: none; border: 1px solid rgba(255,255,255,0.3); padding: 5px 10px; border-radius: 4px; }
  .nav-admin:hover { background: rgba(255,255,255,0.1); color: #fff; }

  /* TABS */
  .tab-bar { background: var(--jfa-blue-dark); display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn { flex: none; color: rgba(255,255,255,0.65); font-size: 12px; padding: 10px 16px; border: none; background: none; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab-btn.active { color: #fff; border-bottom-color: var(--accent); font-weight: 700; }
  .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }

  /* LEAGUE SELECTOR */
  .league-bar { background: #fff; border-bottom: 2px solid var(--border); display: flex; overflow-x: auto; padding: 0 12px; gap: 4px; scrollbar-width: none; }
  .league-bar::-webkit-scrollbar { display: none; }
  .league-chip { flex: none; padding: 8px 16px; font-size: 12px; font-weight: 600; border: none; background: none; cursor: pointer; color: var(--text-sub); border-bottom: 3px solid transparent; transition: all 0.15s; }
  .league-chip.active { color: var(--jfa-blue); border-bottom-color: var(--jfa-blue); }

  /* MAIN */
  .main { max-width: 900px; margin: 0 auto; padding: 16px 12px 80px; }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; }

  /* CARD */
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; }
  .card-head { background: var(--jfa-blue); color: #fff; padding: 10px 16px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .card-head .icon { font-size: 16px; }
  .card-body { padding: 0; }

  /* STANDINGS TABLE */
  .standings-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .standings-table th { background: #f0f3fa; color: var(--jfa-blue); font-size: 11px; font-weight: 700; padding: 8px 6px; text-align: center; border-bottom: 2px solid var(--border); position: sticky; top: 0; }
  .standings-table th:first-child { text-align: left; padding-left: 12px; }
  .standings-table td { padding: 10px 6px; text-align: center; border-bottom: 1px solid #eef0f5; }
  .standings-table td:first-child { text-align: left; padding-left: 12px; font-weight: 600; }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table tr:hover td { background: #f8f9fc; }
  .standings-table .rank { width: 28px; font-weight: 700; color: var(--text-sub); font-size: 13px; }
  .standings-table .pts { font-weight: 700; color: var(--jfa-blue); font-size: 14px; }
  .rank-1 { color: var(--gold) !important; }
  .rank-2 { color: #888 !important; }
  .rank-3 { color: #a06030 !important; }

  /* MATCH LIST */
  .match-item { padding: 12px 16px; border-bottom: 1px solid #eef0f5; display: flex; align-items: center; gap: 8px; }
  .match-item:last-child { border-bottom: none; }
  .match-date { font-size: 11px; color: var(--text-sub); min-width: 70px; }
  .match-teams { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; }
  .match-team { flex: 1; font-weight: 600; }
  .match-team.home { text-align: right; }
  .match-team.away { text-align: left; }
  .match-score { background: var(--jfa-blue); color: #fff; font-weight: 700; font-size: 14px; padding: 4px 10px; border-radius: 4px; min-width: 52px; text-align: center; }
  .match-score.upcoming { background: var(--border); color: var(--text-sub); font-size: 11px; font-weight: 400; }
  .match-venue { font-size: 10px; color: var(--text-sub); white-space: nowrap; }

  /* SCORERS */
  .scorer-item { padding: 10px 16px; border-bottom: 1px solid #eef0f5; display: flex; align-items: center; gap: 12px; }
  .scorer-item:last-child { border-bottom: none; }
  .scorer-rank { font-size: 20px; font-weight: 700; color: var(--border); min-width: 32px; text-align: center; }
  .scorer-info { flex: 1; }
  .scorer-name { font-weight: 700; font-size: 13px; }
  .scorer-team { font-size: 11px; color: var(--text-sub); }
  .scorer-goals { font-size: 22px; font-weight: 700; color: var(--jfa-blue); min-width: 36px; text-align: right; }
  .scorer-goals span { font-size: 11px; font-weight: 400; color: var(--text-sub); }

  /* NOTICE */
  .notice-item { padding: 14px 16px; border-bottom: 1px solid #eef0f5; }
  .notice-item:last-child { border-bottom: none; }
  .notice-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-right: 8px; }
  .tag-info { background: #e8f0ff; color: var(--jfa-blue); }
  .tag-important { background: #ffe8ea; color: var(--accent); }
  .tag-doc { background: #e8fff0; color: #006630; }
  .notice-title { font-size: 13px; font-weight: 600; margin-top: 4px; }
  .notice-date { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
  .notice-body { font-size: 12px; color: var(--text-sub); margin-top: 6px; line-height: 1.6; }

  /* SUSPENSION */

  .suspension-item:last-child { border-bottom: none; }

  .sus-info { flex: 1; }
  .sus-name { font-weight: 600; font-size: 13px; }
  .sus-detail { font-size: 11px; color: var(--text-sub); }
  .sus-game { font-size: 11px; color: var(--accent); font-weight: 600; text-align: right; }

  /* FLOW BANNER */
  .flow-banner { background: linear-gradient(135deg, var(--jfa-blue) 0%, var(--jfa-blue-light) 100%); color: #fff; border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .flow-title { font-size: 11px; font-weight: 700; opacity: 0.7; letter-spacing: 0.1em; margin-bottom: 10px; }
  .flow-steps { display: flex; overflow-x: auto; gap: 0; scrollbar-width: none; }
  .flow-steps::-webkit-scrollbar { display: none; }
  .flow-step { flex: none; display: flex; align-items: center; font-size: 11px; }
  .flow-step-inner { background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 4px; white-space: nowrap; font-weight: 600; }
  .flow-step-inner.current { background: var(--accent); }
  .flow-arrow { opacity: 0.4; padding: 0 4px; font-size: 14px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 16px; color: var(--text-sub); }

  .footer { text-align: center; padding: 16px; font-size: 11px; color: var(--text-sub); }

</head>

let currentLeague = 'u15a';
let currentSection = 'schedule';

// ===== INIT =====
function init() {
  renderLeagueTabs();
  renderFlow();
  render();
}

function renderLeagueTabs() {
  const bar = document.getElementById('leagueBar');
  bar.innerHTML = DB.leagues.map(l => `
    <button class="league-chip ${l.id===currentLeague?'active':''}" onclick="setLeague('${l.id}')">${l.name}</button>
  `).join('');
}

function setLeague(id) {
  currentLeague = id;
  renderLeagueTabs();
  render();
}

function renderFlow() {
  const el = document.getElementById('flowSteps');
  el.innerHTML = DB.flow.map((s,i) => `
    <div class="flow-step">
      ${i>0?'<span class="flow-arrow">›</span>':''}
      <div class="flow-step-inner ${s.current?'current':''}">${s.done?'✓ ':s.current?'● ':''}${s.label}</div>
    </div>
  `).join('');
}

function showSection(name) {
  currentSection = name;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
  render();
}

function render() {
  if(currentSection==='schedule') renderSchedule();
  if(currentSection==='standings') renderStandings();
  if(currentSection==='scorers') renderScorers();
  if(currentSection==='suspensions') renderSuspensions();
  if(currentSection==='notices') renderNotices();
}

// ===== SCHEDULE =====
function renderSchedule() {
  const matches = DB.matches.filter(m=>m.league===currentLeague).sort((a,b)=>a.date.localeCompare(b.date));
  if(!matches.length){ document.getElementById('matchList').innerHTML='<div class="empty"><div class="e-icon">📅</div><p>試合が登録されていません</p></div>'; return; }
  
  let html=''; let lastDate='';
  matches.forEach(m=>{
    const home = DB.teams.find(t=>t.id===m.home);
    const away = DB.teams.find(t=>t.id===m.away);
    if(!home||!away) return;
    const d = new Date(m.date);
    const dateStr = `${d.getMonth()+1}/${d.getDate()}（${'日月火水木金土'.split('')[d.getDay()]}）`;
    if(m.date!==lastDate){
      if(lastDate) html+=`</div>`;
      html+=`<div style="background:#f7f8fc;padding:6px 16px;font-size:11px;font-weight:700;color:var(--text-sub);border-bottom:1px solid #eef0f5;">${dateStr}</div><div>`;
      lastDate=m.date;
    }
    const score = m.status==='done'
      ? `<div class="match-score">${m.homeGoal} - ${m.awayGoal}</div>`
      : `<div class="match-score upcoming">${m.time||'TBD'}</div>`;
    html+=`
      <div class="match-item">
        <div class="match-teams">
          <div class="match-team home">${home.short}</div>
          ${score}
          <div class="match-team away">${away.short}</div>
        </div>
        <div class="match-venue">📍${m.venue||''}</div>
      </div>
    `;
  });
  if(lastDate) html+=`</div>`;
  document.getElementById('matchList').innerHTML=html;
}

// ===== STANDINGS =====
function calcStandings(leagueId) {
  const leagueTeams = DB.teams.filter(t=>t.league===leagueId);
  const matches = DB.matches.filter(m=>m.league===leagueId && m.status==='done');
  const stats = {};
  leagueTeams.forEach(t=>{ stats[t.id]={gp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  matches.forEach(m=>{
    if(!stats[m.home]||!stats[m.away]) return;
    const h=stats[m.home], a=stats[m.away];
    h.gp++; a.gp++;
    h.gf+=m.homeGoal; h.ga+=m.awayGoal;
    a.gf+=m.awayGoal; a.ga+=m.homeGoal;
    if(m.homeGoal>m.awayGoal){ h.w++; h.pts+=3; a.l++; }
    else if(m.homeGoal<m.awayGoal){ a.w++; a.pts+=3; h.l++; }
    else { h.d++; a.d++; h.pts++; a.pts++; }
  });
  return leagueTeams.map(t=>({...t,...stats[t.id],gd:(stats[t.id]?.gf||0)-(stats[t.id]?.ga||0)}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

function renderStandings() {
  const rows = calcStandings(currentLeague);
  if(!rows.length){ document.getElementById('standingsBody').innerHTML='<tr><td colspan="10" style="text-align:center;padding:24px;color:var(--text-sub);">チームが登録されていません</td></tr>'; return; }
  const rankClass = ['rank-1','rank-2','rank-3'];
  document.getElementById('standingsBody').innerHTML = rows.map((t,i)=>`
    <tr>
      <td class="rank ${rankClass[i]||''}">${i+1}</td>
      <td style="font-weight:600;">${t.name}</td>
      <td>${t.gp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
      <td>${t.gf}</td><td>${t.ga}</td><td>${t.gd>=0?'+':''}${t.gd}</td>
      <td class="pts">${t.pts}</td>
    </tr>
  `).join('');
}

// ===== SCORERS =====
function renderScorers() {
  const leagueMatches = DB.matches.filter(m=>m.league===currentLeague && m.status==='done');
  const tally = {};
  leagueMatches.forEach(m=>{
    (m.scorers||[]).forEach(s=>{
      if(!tally[s.playerId]) tally[s.playerId]={goals:0,teamId:s.teamId};
      tally[s.playerId].goals+=s.count||1;
    });
  });
  const list = Object.entries(tally).map(([pid,v])=>{
    const p=DB.players.find(x=>x.id===pid);
    const t=DB.teams.find(x=>x.id===v.teamId);
    return {name:p?.name||'?',team:t?.short||'?',goals:v.goals};
  }).sort((a,b)=>b.goals-a.goals);

  if(!list.length){ document.getElementById('scorerList').innerHTML='<div class="empty"><div class="e-icon">⚽</div><p>得点データがありません</p></div>'; return; }
  const medals=['🥇','🥈','🥉'];
  document.getElementById('scorerList').innerHTML = list.map((s,i)=>`
    <div class="scorer-item">
      <div class="scorer-rank">${medals[i]||i+1}</div>
      <div class="scorer-info">
        <div class="scorer-name">${s.name}</div>
        <div class="scorer-team">${s.team}</div>
      </div>
      <div class="scorer-goals">${s.goals}<span>得点</span></div>
    </div>
  `).join('');
}

// ===== SUSPENSIONS =====
function renderSuspensions() {
  // 退場者 → 次節出場停止
  const leagueMatches = DB.matches.filter(m=>m.league===currentLeague && m.status==='done');
  const sendoffs = [];
  const bookingCount = {};

  leagueMatches.forEach(m=>{
    (m.sendoffs||[]).forEach(s=>{
      const p=DB.players.find(x=>x.id===s.playerId);
      const t=DB.teams.find(x=>x.id===s.teamId);
      sendoffs.push({name:p?.name||'?',team:t?.short||'?',reason:s.reason,games:1});
    });
    (m.bookings||[]).forEach(b=>{
      if(b.type==='Y'){
        if(!bookingCount[b.playerId]) bookingCount[b.playerId]={count:0,teamId:b.teamId};
        bookingCount[b.playerId].count++;
      }
    });
  });

  let susHtml='';
  if(sendoffs.length){
    susHtml = sendoffs.map(s=>`
      <div class="suspension-item">
        <div class="sus-badge">出場停止</div>
        <div class="sus-info">
          <div class="sus-name">${s.name}</div>
          <div class="sus-detail">${s.team} ／ ${s.reason==='2Y'?'2枚目警告による退場':'直接退場'}</div>
        </div>
        <div class="sus-game">${s.games}試合停止</div>
      </div>
    `).join('');
  } else {
    susHtml = '<div class="empty"><div class="e-icon">✅</div><p>出場停止選手はいません</p></div>';
  }
  document.getElementById('suspensionList').innerHTML=susHtml;

  // 警告累積
  const accumulated = Object.entries(bookingCount).filter(([pid,v])=>v.count>=2);
  let bookHtml='';
  if(accumulated.length){
    bookHtml=accumulated.map(([pid,v])=>{
      const p=DB.players.find(x=>x.id===pid);
      const t=DB.teams.find(x=>x.id===v.teamId);
      return `
        <div class="suspension-item">
          <div class="sus-badge" style="background:var(--gold);">警告累積</div>
          <div class="sus-info">
            <div class="sus-name">${p?.name||'?'}</div>
            <div class="sus-detail">${t?.short||'?'} ／ 累積${v.count}枚</div>
          </div>
          <div class="sus-game" style="color:var(--gold);">注意</div>
        </div>
      `;
    }).join('');
  } else {
    const allBookings = Object.entries(bookingCount);
    if(allBookings.length){
      bookHtml=allBookings.map(([pid,v])=>{
        const p=DB.players.find(x=>x.id===pid);
        const t=DB.teams.find(x=>x.id===v.teamId);
        return `
          <div class="suspension-item">
            <div class="sus-badge" style="background:#f0f3fa;color:var(--text-sub);">🟨 ${v.count}枚</div>
            <div class="sus-info">
              <div class="sus-name">${p?.name||'?'}</div>
              <div class="sus-detail">${t?.short||'?'}</div>
            </div>
          </div>
        `;
      }).join('');
    } else {
      bookHtml='<div class="empty"><div class="e-icon">🟨</div><p>警告選手はいません</p></div>';
    }
  }
  document.getElementById('bookingList').innerHTML=bookHtml;
}

// ===== NOTICES =====
function renderNotices() {
  const tagMap={info:'tag-info',important:'tag-important',doc:'tag-doc'};
  const tagLabel={info:'お知らせ',important:'重要',doc:'要項・通達'};
  document.getElementById('noticeList').innerHTML = DB.notices.map(n=>`
    <div class="notice-item">
      <span class="notice-tag ${tagMap[n.tag]||'tag-info'}">${tagLabel[n.tag]||'お知らせ'}</span>
      <div class="notice-title">${n.title}</div>
      <div class="notice-date">${n.date}</div>
      <div class="notice-body">${n.body}</div>
    </div>
  `).join('');
}
